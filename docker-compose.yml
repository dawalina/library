version: '3'

services:

  app:
    container_name: lib_app
    build:
      context: ./containers/app
      dockerfile: Dockerfile
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./containers/app/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - app-network
    env_file: '.env'
    links:
      - mysql
      - redis

  nginx:
    container_name: lib_nginx
    build:
      context: ./containers/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./containers/nginx/local/conf.d/:/etc/nginx/conf.d/
    networks:
      - app-network

  mysql:
    container_name: lib_mysql
    build:
      context: ./containers/mysql
      dockerfile: Dockerfile
    volumes:
      - mysqlvolume:/var/lib/mysql
    environment:
      - "MYSQL_DATABASE=laravel"
      - "MYSQL_USER=admin"
      - "MYSQL_PASSWORD=admin"
      - "MYSQL_ROOT_PASSWORD=root"
    ports:
      - 3306:3306
    networks:
      - app-network

  redis:
    image: redis:5.0.7

volumes:
  mysqlvolume:

#Docker Networks
networks:
  app-network:
    driver: bridge
